<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Botmux Desktop</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside class="rail" aria-label="Botmux dashboard navigation">
      <a class="brand" href="#/" data-dashboard-route="#/">
        <span class="brand-mark" aria-hidden="true">B</span>
        <div class="brand-text">
          <strong>botmux</strong>
        </div>
      </a>

      <nav class="sidebar-nav" aria-label="Dashboard sections">
        <a href="#/" data-dashboard-route="#/" data-route="overview">
          <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="1.5" width="5.4" height="5.4" rx="1.5"/><rect x="9.1" y="1.5" width="5.4" height="5.4" rx="1.5"/><rect x="1.5" y="9.1" width="5.4" height="5.4" rx="1.5"/><rect x="9.1" y="9.1" width="5.4" height="5.4" rx="1.5"/></svg>
          <span data-i18n="nav.overview">总览</span>
        </a>
        <a href="#/sessions" data-dashboard-route="#/sessions" data-route="sessions">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 3.5h12v7H6l-3 3v-3H2z"/></svg>
          <span data-i18n="nav.sessions">会话</span>
        </a>
        <a href="#/groups" data-dashboard-route="#/groups" data-route="groups">
          <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="5.6" cy="5.8" r="2.4"/><circle cx="11" cy="6.8" r="1.9"/><path d="M1.8 13.2c.5-2.4 2-3.6 3.8-3.6s3.3 1.2 3.8 3.6M9.8 12.6c.4-1.7 1.5-2.6 2.8-2.6 1 0 1.9.5 2.4 1.6"/></svg>
          <span data-i18n="nav.groups">群组</span>
        </a>
        <a href="#/roles" data-dashboard-route="#/roles" data-route="roles">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.8l5.2 2v3.4c0 3.4-2.2 5.9-5.2 7-3-1.1-5.2-3.6-5.2-7V3.8z"/><path d="M5.8 8l1.6 1.6 2.8-3"/></svg>
          <span data-i18n="nav.roles">角色管理</span>
        </a>
        <a href="#/monitoring" data-dashboard-route="#/monitoring" data-route="monitoring">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 9.2h2.3l1.3-4.8 2.5 8.4 1.8-5.1h4.1"/><path d="M2 2.5h12v11H2z"/></svg>
          <span data-i18n="nav.monitoring">监控看板</span>
        </a>
        <a href="#/insights" data-dashboard-route="#/insights" data-route="insights">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 2v12h12M5 11V7M8.5 11V4.5M12 11V8.5"/></svg>
          <span data-i18n="nav.insights">洞察</span>
        </a>
        <a href="#/workflows" data-dashboard-route="#/workflows" data-route="workflows">
          <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="3.4" cy="3.6" r="1.9"/><circle cx="3.4" cy="12.4" r="1.9"/><circle cx="12.6" cy="8" r="1.9"/><path d="M5.2 4.4l5.6 2.8M5.2 11.6l5.6-2.8"/></svg>
          <span data-i18n="nav.workflows">工作流</span>
        </a>
        <a href="#/schedules" data-dashboard-route="#/schedules" data-route="schedules">
          <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="6.2"/><path d="M8 4.5V8l2.4 1.6"/></svg>
          <span data-i18n="nav.schedules">定时</span>
        </a>
        <a href="#/whiteboards" data-dashboard-route="#/whiteboards" data-route="whiteboards">
          <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2.2" y="2.2" width="11.6" height="11.6" rx="2"/><path d="M4.8 5.2h6.4M4.8 8h6.4M4.8 10.8h4"/></svg>
          <span data-i18n="nav.whiteboards">白板</span>
        </a>
        <a href="#/office" data-dashboard-route="#/office" data-route="office">
          <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="3" y="4" width="10" height="7" rx="2"/><circle cx="6" cy="7.5" r="1"/><circle cx="10" cy="7.5" r="1"/><path d="M8 4V2M4.5 11v2M11.5 11v2"/></svg>
          <span data-i18n="nav.office">办公室</span>
        </a>
        <a href="#/bot-defaults" data-dashboard-route="#/bot-defaults" data-route="bot-defaults">
          <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2.5" y="5" width="11" height="8" rx="2"/><circle cx="5.8" cy="9" r="1"/><circle cx="10.2" cy="9" r="1"/><path d="M8 5V2.5M5.5 13v1.2M10.5 13v1.2"/></svg>
          <span data-i18n="nav.botDefaults">Bot 配置</span>
        </a>
        <a href="#/skills" data-dashboard-route="#/skills" data-route="skills">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 2.5h10v3H3zM3 7h10v6.5H3z"/><path d="M5.4 9.2h5.2M5.4 11.2h3.8"/></svg>
          <span data-i18n="nav.skills">Skills</span>
        </a>
        <a href="#/plugins" data-dashboard-route="#/plugins" data-route="plugins">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M6.4 1.8h3.2v3h2.8v3.2H9.6v2.8H6.4V8H3.6V4.8h2.8z"/><path d="M2.2 11.8h11.6v2.4H2.2z"/></svg>
          <span>插件</span>
        </a>
        <a href="#/team" data-dashboard-route="#/team" data-route="team">
          <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="6.2"/><path d="M1.8 8h12.4M8 1.8c-2 1.8-2 10.6 0 12.4 2-1.8 2-10.6 0-12.4z"/></svg>
          <span data-i18n="nav.team">团队</span>
        </a>
        <a href="#/connectors" data-dashboard-route="#/connectors" data-route="connectors">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M5.5 6.5v-3a2.5 2.5 0 0 1 5 0v3"/><rect x="3.5" y="6.5" width="9" height="7" rx="2"/></svg>
          <span data-i18n="nav.connectors">Webhook</span>
        </a>
        <a href="#/settings" data-dashboard-route="#/settings" data-route="settings">
          <svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="2.2"/><path d="M8 1.8v2M8 12.2v2M3.6 3.6L5 5M11 11l1.4 1.4M1.8 8h2M12.2 8h2M3.6 12.4L5 11M11 5l1.4-1.4"/></svg>
          <span data-i18n="nav.settings">设置</span>
        </a>
      </nav>

      <div class="sidebar-foot" aria-live="polite">
        <div class="runtime-line">
          <span id="runtime-dot" class="status-dot" data-status="starting" aria-hidden="true"></span>
          <div class="runtime-copy">
            <div id="runtime-status" class="runtime-status" data-i18n="runtime.checking">正在检查运行时</div>
            <div id="runtime-meta" class="runtime-meta" data-i18n="runtime.waitingBridge">等待桌面桥接</div>
          </div>
        </div>
        <div class="runtime-actions runtime-control-group" aria-label="CLI actions">
          <button id="start-btn" class="runtime-action runtime-action-primary" type="button" disabled>
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M5.2 3.4 12 8l-6.8 4.6z"/></svg>
            <span class="runtime-action-label" data-i18n="action.start">启动</span>
          </button>
          <button id="stop-btn" class="runtime-action runtime-action-danger" type="button" disabled>
            <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="4.2" y="4.2" width="7.6" height="7.6" rx="1.3"/></svg>
            <span class="runtime-action-label" data-i18n="action.stop">停止</span>
          </button>
          <button id="restart-btn" class="runtime-action runtime-action-quiet" type="button" disabled>
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M12.2 5.4A4.8 4.8 0 1 0 13 8"/><path d="M12.4 2.8v2.8H9.6"/></svg>
            <span class="runtime-action-label" data-i18n="action.restart">重启</span>
          </button>
          <button id="takeover-btn" class="runtime-action runtime-action-takeover" type="button" disabled hidden>
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2.6 8h8.2"/><path d="m8.1 4.9 3.1 3.1-3.1 3.1"/><path d="M12.7 3.5h1.1v9h-1.1"/></svg>
            <span class="runtime-action-label" data-i18n="action.takeover">接管</span>
          </button>
        </div>

        <div class="footer-meta-row">
          <label class="login-row">
            <input id="login-toggle" type="checkbox" disabled />
            <span data-i18n="login.launchAtLogin">开机启动 App</span>
          </label>
          <div id="version-line" class="version-line" data-i18n="version.unavailable">版本信息不可用</div>
        </div>
      </div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div class="topbar-title">
          <strong>botmux</strong>
          <span data-i18n="app.subtitle">飞书 AI CLI 控制台</span>
        </div>
        <div class="topbar-status" aria-label="CLI summary">
          <span class="status-pill"><span data-i18n="summary.onlineDaemons">在线 Daemon</span><strong id="online-count">0</strong></span>
          <span class="status-pill"><span data-i18n="summary.needsAttention">需要处理</span><strong id="attention-count">0</strong></span>
          <span class="status-pill"><span data-i18n="summary.configuredBots">已配置 Bot</span><strong id="bot-count">0</strong></span>
        </div>
        <div class="topbar-actions" aria-label="CLI actions">
          <div class="locale-toggle" aria-label="Language">
            <button type="button" data-locale="zh">中</button>
            <button type="button" data-locale="en">EN</button>
          </div>
          <button id="create-session-btn" type="button" class="primary-action" data-i18n="action.createSession">创建会话</button>
          <button id="add-bot-btn" type="button" data-i18n="action.addBot">添加机器人</button>
          <a
            id="docs-link"
            class="topbar-link"
            href="https://bytedance.aiforce.cloud/app/app_4k9smq6rdxher/"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="action.docs"
          >文档</a>
          <button id="logs-btn" type="button" data-i18n="action.logs">日志</button>
          <button id="home-btn" type="button" data-i18n="action.openHome">打开目录</button>
        </div>
      </header>

      <main class="dashboard-host">
        <webview
          id="dashboard-frame"
          title="Botmux dashboard"
          partition="persist:botmux-dashboard"
          data-visible="false"
          aria-hidden="true"
          allowpopups
        ></webview>
        <div id="empty-dashboard" class="empty-dashboard" data-i18n="empty.startRuntime">启动运行时后加载控制台。</div>
      </main>
    </div>

    <section id="logs-drawer" class="logs" aria-label="Runtime logs" aria-hidden="true">
      <header class="logs-header">
        <div class="logs-heading">
          <h2 data-i18n="logs.title">日志</h2>
          <select id="log-target" aria-label="Log target" disabled></select>
        </div>
        <div class="logs-actions">
          <button id="copy-logs" type="button" data-i18n="action.copy">复制</button>
          <button id="open-logs" type="button" data-i18n="action.openFolder">打开文件夹</button>
          <button id="close-logs" type="button" aria-label="Close logs drawer" data-i18n="action.close">关闭</button>
        </div>
      </header>
      <pre id="log-output" class="log-output" data-i18n="logs.initial">打开日志后开始跟随输出。</pre>
    </section>

    <script src="app.js" defer></script>
  </body>
</html>
